# AI PPT 生成器配置文件

# API 配置
api:
  # 默认 API 配置（用于图像生成）
  api_key: "sk-rt5QnsvxaNdKlZoKy6nepxCIiM9MXqm1R8DFQ47VHHgh148l"
  base_url: "https://magic666.top"
  image_model: "gemini-3-pro-image-preview"
  
  # 文本生成 API 配置
  # text_api_format: "gemini" 或 "openai"
